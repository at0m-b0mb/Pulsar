# PULSAR — neon arcade game for Apple Watch
#
# Generated with XcodeGen (same workflow as Cipher):
#
#   xcodegen generate     # run from this folder whenever files are added
#   open Pulsar.xcodeproj
#
# Standalone watchOS app — no iPhone companion required. Designed for the
# Apple Watch Ultra's big display but adapts to every watch size.

name: Pulsar

options:
  bundleIdPrefix: com.at0mb0mb
  deploymentTarget:
    watchOS: "10.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MXA2HAFVNC
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:

  # ── Watch-only game ─────────────────────────────────────────────────────
  Pulsar Watch App:
    type: application
    platform: watchOS
    sources:
      - path: PulsarWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.at0mb0mb.pulsar
        PRODUCT_NAME: Pulsar
        INFOPLIST_KEY_CFBundleDisplayName: Pulsar
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

schemes:
  Pulsar Watch App:
    build:
      targets:
        Pulsar Watch App: all
    run:
      config: Debug
